<div class="container-project">
    <div class="titulo-project">Projetos</div>
    <button (click)="modal.abrir()" class="botao-add">+ Criar Projeto</button>
</div>

<app-modal #modal titulo="Novo Projeto">
    <form (ngSubmit)="salvar(modal)">
        <div class="input-group">
            <label for="nameProject">Nome do projeto</label>
            <input type="text" name="nameProject" [(ngModel)]="projectData.nameProject" required>
        </div>

        <div class="input-group">
            <label for="description">Descrição</label>
            <textarea rows="3" name="description" [(ngModel)]="projectData.description" placeholder="Descrição projeto"
                required></textarea>
        </div>

        <div class="container-modal">
            <button class="cancel-button" (click)="modal.fechar()">Cancelar</button>
            <button type="submit" class="login-button">Criar</button>
        </div>
    </form>
</app-modal>

<div class="container">
    @for (item of projects; track item.name) {
    <div class="card">
        <div class="card-title">
            <h2 class="nome">{{ item.name }}</h2>
            <button class="button-task" (click)="showTask()">Tarefas</button>
        </div>

        <p class="descricao">{{ item.description }}</p>
    </div>
    } @empty {
    <div class="container-center">
        <p>Nenhum projeto</p>
    </div>
    }
</div>

@if (isShowTask) {
<app-task></app-task>
}
